<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ребусы</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="quiz-page">
  <div class="quiz-wrap">
    <div class="quiz-card rebus-card">
      <div class="quiz-top">
        <div id="progress">Ребус 1 / 10</div>
        <div>Экономические ребусы</div>
      </div>

      <h2 id="rebusTitle" class="rebus-title">Загрузка ребуса...</h2>

      <div id="answerBox" class="answer-box hidden"></div>

      <div class="quiz-bottom">
        <button id="showAnswerBtn" class="action-btn">Показать ответ</button>
        <button id="nextRebusBtn" class="action-btn">Следующий</button>
        <a href="index.html" class="action-btn menu-link">Главное меню</a>
      </div>
    </div>
  </div>

  <script src="rebus.js"></script>
</body>
</html>
