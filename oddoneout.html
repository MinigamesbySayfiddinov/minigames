<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Лишний</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="quiz-page">
  <div class="quiz-wrap">
    <div class="quiz-card odd-card">
      <div class="quiz-top">
        <div id="progress">Раунд 1 / 5</div>
        <div>Найди лишнее</div>
      </div>

      <div class="term-label">Выбери лишний термин</div>
      <div id="oddOptions" class="odd-grid"></div>

      <div id="oddResult" class="result"></div>
      <div id="oddExplanation" class="odd-explanation"></div>

      <div class="quiz-bottom">
        <button id="showOddAnswerBtn" class="action-btn">Показать ответ</button>
        <button id="nextOddBtn" class="action-btn">Следующий</button>
        <a href="index.html" class="action-btn menu-link">Главное меню</a>
      </div>
    </div>
  </div>

  <script src="oddoneout.js"></script>
</body>
</html>
